<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>17 Anos da Alinne 🍓</title>
    <style>
        :root { --vermelho: #ff4d4d; --verde: #2ecc71; }
        
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            font-family: 'Segoe UI', sans-serif; overflow: hidden;
            background: #000; color: white;
        }

        /* FUNDO ESTELAR */
        #star-container {
            position: fixed; width: 100%; height: 100%;
            background: radial-gradient(ellipse at bottom, #1B2735 0%, #090A0F 100%);
            z-index: 1;
        }
        .star {
            position: absolute; background: white; border-radius: 50%;
            opacity: 0.5; animation: twinkle var(--d) infinite;
        }
        @keyframes twinkle { 0%, 100% { opacity: 0.3; transform: scale(1); } 50% { opacity: 1; transform: scale(1.2); } }

        /* ELEMENTOS CAINDO */
        .falling { position: absolute; pointer-events: none; z-index: 10; animation: fall linear infinite; }
        @keyframes fall {
            0% { transform: translateY(-10vh) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
        }

        /* TELA DE ENTRADA (Obrigatória para o som funcionar) */
        #overlay-start {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 1000; display: flex; justify-content: center; align-items: center;
        }
        .btn-start {
            background: var(--vermelho); color: white; border: none; padding: 20px 40px;
            border-radius: 50px; font-size: 1.2rem; font-weight: bold; cursor: pointer;
            box-shadow: 0 0 20px var(--vermelho); animation: pulse 1.5s infinite;
        }

        /* TELA 1: NOME NEON */
        .neon-title {
            font-size: 4rem; color: #fff; text-align: center; font-weight: 900;
            text-transform: uppercase; letter-spacing: 5px;
            text-shadow: 0 0 10px var(--vermelho), 0 0 20px var(--vermelho), 0 0 40px var(--vermelho);
            animation: pulseNeon 2s infinite; z-index: 20; position: relative;
        }
        @keyframes pulseNeon {
            0%, 100% { text-shadow: 0 0 10px var(--vermelho), 0 0 20px var(--vermelho); transform: scale(1); }
            50% { text-shadow: 0 0 20px var(--vermelho), 0 0 40px var(--vermelho); transform: scale(1.05); }
        }

        /* QUIZ E CARDS */
        .card { 
            background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(12px);
            padding: 30px; border-radius: 30px; width: 85%; max-width: 320px;
            z-index: 20; border: 1px solid rgba(255,255,255,0.2); text-align: center;
        }
        .btn-option { 
            background: white; color: #333; border: none; padding: 15px;
            border-radius: 12px; font-size: 16px; margin: 10px 0; width: 100%; 
            font-weight: bold; transition: 0.3s; cursor: pointer;
        }
        .btn-correct { background: var(--verde) !important; color: white !important; }
        .btn-wrong { background: var(--vermelho) !important; color: white !important; animation: shake 0.4s; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-10px); } 75% { transform: translateX(10px); } }

        /* POLAROIDS E RASPADINHA */
        .polaroid { position: absolute; width: 105px; background: white; padding: 8px 8px 22px 8px; box-shadow: 0 8px 20px rgba(0,0,0,0.8); z-index: 50; transform: rotate(var(--r)); transition: 0.3s; }
        .polaroid img { width: 100%; height: 95px; object-fit: cover; }
        #scratch-container { position: relative; width: 250px; height: 330px; border: 6px solid white; border-radius: 15px; overflow: hidden; }
        canvas { position: absolute; top:0; left:0; z-index: 10; touch-action: none; }

        /* UTILITÁRIOS */
        .hidden { display: none !important; }
        .tela { position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; }
        .love-text { display: block; font-size: 1.8rem; font-weight: bold; color: #ff4d4d; margin-top: 20px; animation: heartBeat 1.5s infinite; }
        @keyframes heartBeat { 0%, 28%, 70% { transform: scale(1); } 14%, 42% { transform: scale(1.1); } }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
    </style>
</head>
<body>

    <div id="overlay-start">
        <button class="btn-start" onclick="iniciar()">CLIQUE AQUI, ALINNE ❤️</button>
    </div>

    <iframe id="musica-bk" width="0" height="0" src="" frameborder="0" allow="autoplay"></iframe>
    <div id="star-container"></div>

    <div id="tela-nome" class="tela hidden">
        <h1 class="neon-title">ALINNE</h1>
        <div style="font-size: 25px; margin: 20px;">🍓 🎈 ✨</div>
        <div style="font-size: 35px; animation: bounce 2s infinite;">▲</div>
        <p>ARRASTE PARA CIMA</p>
    </div>

    <div id="tela-contador" class="tela hidden">
        <h2 id="num-contador" style="font-size: 5rem; color: var(--vermelho); margin: 0;">0</h2>
        <p style="font-size: 1.2rem;">dias de história...</p>
        <div id="box-frases" class="hidden" style="padding: 20px;">
            <p><i>"Qualquer plano se torna perfeito se for com você."</i></p>
            <button class="btn-option" onclick="irParaQuiz()">Abrir Presente ✨</button>
        </div>
    </div>

    <div id="tela-quiz" class="tela hidden">
        <div class="card">
            <h2 id="pergunta-txt"></h2>
            <div id="opcoes-cont"></div>
        </div>
    </div>

    <div id="tela-raspadinha" class="tela hidden">
        <div style="position: relative;">
            <div class="polaroid" style="top: -40px; left: -40px; --r: -10deg;"><img src="https://cdn.discordapp.com/attachments/1453229527739142285/1474220443966771270/IMG_20241104_144249.jpg?ex=69990e47&is=6997bcc7&hm=a6c8dd7459fc6349d7dbbe4d41cfc99f09dd1f0a1c15a0c9a83a3e5b255992e9&"></div>
            <div class="polaroid" style="bottom: -30px; right: -40px; --r: 8deg;"><img src="https://cdn.discordapp.com/attachments/1453229527739142285/1474220122263781488/Screenshot_2025-02-18-19-47-26-021_com.instagram.android2.jpg?ex=69990dfa&is=6997bc7a&hm=e31edae5c434b9b4cef17a2459b1e616b96a7fc1589531cc570a74bf0cd5f869&"></div>
            <div id="scratch-container">
                <iframe id="vid-raspar" width="100%" height="100%" src="https://www.youtube.com/embed/6JG20Tt2DAQ?enablejsapi=1&mute=1" frameborder="0"></iframe>
                <canvas id="canvas-raspar" width="250" height="330"></canvas>
            </div>
        </div>
        <button class="btn-start" style="margin-top: 30px; font-size: 1rem;" onclick="irParaFinal()">Ainda não acabou... ✨</button>
    </div>

    <div id="tela-final" class="tela hidden" style="background: #000; overflow-y: auto; justify-content: flex-start; padding-top: 40px;">
        <div id="vid-final-cont" style="width: 85%; max-width: 400px; border-radius: 15px; overflow: hidden; border: 2px solid white;">
            <iframe id="vid-enhypen" width="100%" height="220" src="" frameborder="0"></iframe>
        </div>
        <div id="texto-final" style="padding: 30px; line-height: 1.6; text-align: left;"></div>
    </div>

    <script>
        // INICIAR TUDO
        function iniciar() {
            document.getElementById('overlay-start').style.display = 'none';
            document.getElementById('tela-nome').classList.remove('hidden');
            document.getElementById('musica-bk').src = "https://www.youtube.com/embed/V141wUSkTfk?autoplay=1";
            gerarEstrelas();
            setInterval(gerarChuva, 300);
        }

        function gerarEstrelas() {
            const cont = document.getElementById('star-container');
            for(let i=0; i<100; i++) {
                const s = document.createElement('div');
                s.className = 'star';
                const size = Math.random()*3+'px';
                s.style.width = size; s.style.height = size;
                s.style.left = Math.random()*100+'vw';
                s.style.top = Math.random()*100+'vh';
                s.style.setProperty('--d', Math.random()*3+2+'s');
                cont.appendChild(s);
            }
        }

        function gerarChuva() {
            const itens = ['🍓','🎉','✨','🎈','❤️'];
            const div = document.createElement('div');
            div.className = 'falling';
            div.innerHTML = itens[Math.floor(Math.random()*itens.length)];
            div.style.left = Math.random()*100+'vw';
            div.style.fontSize = Math.random()*20+20+'px';
            div.style.animationDuration = Math.random()*3+4+'s';
            document.body.appendChild(div);
            setTimeout(() => div.remove(), 6000);
        }

        // ARRASTAR
        let yInic;
        document.getElementById('tela-nome').addEventListener('touchstart', e => yInic = e.touches[0].pageY);
        document.getElementById('tela-nome').addEventListener('touchmove', e => {
            if(yInic - e.touches[0].pageY > 70) {
                document.getElementById('tela-nome').classList.add('hidden');
                document.getElementById('tela-contador').classList.remove('hidden');
                rodarContador();
            }
        });

        function rodarContador() {
            let c = 0;
            const t = setInterval(() => {
                c += 7;
                if(c >= 1095) { c=1095; clearInterval(t); document.getElementById('box-frases').classList.remove('hidden'); }
                document.getElementById('num-contador').innerText = c;
            }, 20);
        }

        function irParaQuiz() {
            document.getElementById('tela-contador').classList.add('hidden');
            document.getElementById('tela-quiz').classList.remove('hidden');
            carregarPergunta();
        }

        const perguntas = [
            { q: "Como começamos a nos falar?", o: ["Na escola", "Esbarrão sem querer", "Pelo Insta"], a: 1 },
            { q: "Qual o melhor grupo de kpop que você me apresentou?", o: ["Katseye", "Enhypen", "Twice", "New Jeans"], a: 3 },
            { q: "Qual dessas frases foi dita por você?", o: ["Tô undo", "A PRTEGA?", "Vdi tr ruder"], a: 1 }
        ];
        let idxP = 0;
        function carregarPergunta() {
            const d = perguntas[idxP];
            document.getElementById('pergunta-txt').innerText = d.q;
            const c = document.getElementById('opcoes-cont'); c.innerHTML = "";
            d.o.forEach((opt, i) => {
                const b = document.createElement('button'); b.className = 'btn-option'; b.innerText = opt;
                b.onclick = () => {
                    if(i === d.a) {
                        b.classList.add('btn-correct');
                        setTimeout(() => { idxP++; if(idxP < perguntas.length) carregarPergunta(); else irParaRaspadinha(); }, 800);
                    } else { b.classList.add('btn-wrong'); setTimeout(() => b.classList.remove('btn-wrong'), 500); }
                };
                c.appendChild(b);
            });
        }

        function irParaRaspadinha() {
            document.getElementById('tela-quiz').classList.add('hidden');
            document.getElementById('tela-raspadinha').classList.remove('hidden');
            const cvs = document.getElementById('canvas-raspar'); const ctx = cvs.getContext('2d');
            ctx.fillStyle = '#ff4d4d'; ctx.fillRect(0,0,250,330);
            ctx.fillStyle = 'white'; ctx.font = 'bold 18px sans-serif'; ctx.fillText('RASPE AQUI 🍓', 65, 165);
            let d = false;
            const raspar = (e) => { if(!d) return; const r = cvs.getBoundingClientRect(); const x = (e.clientX || e.touches[0].clientX)-r.left; const y = (e.clientY || e.touches[0].clientY)-r.top; ctx.globalCompositeOperation = 'destination-out'; ctx.beginPath(); ctx.arc(x,y,40,0,Math.PI*2); ctx.fill(); };
            cvs.addEventListener('touchstart', () => d=true); cvs.addEventListener('touchmove', raspar);
        }

        function irParaFinal() {
            document.getElementById('musica-bk').src = "";
            document.getElementById('tela-raspadinha').classList.add('hidden');
            document.getElementById('tela-final').classList.remove('hidden');
            document.getElementById('vid-enhypen').src = "https://www.youtube.com/embed/8KA5mbn513Y?autoplay=1";
            
            setTimeout(() => {
                const f = document.getElementById('texto-final');
                f.innerHTML = "Olhar para trás e ver tudo o que construímos nesses 3 anos me faz perceber que as melhores coisas da vida acontecem quando a gente menos espera... <br><br>Que a gente continue descobrindo músicas novas e criando memórias. <br><br><span class='love-text'>EU TE AMO! ❤️</span>";
            }, 18000);
        }
    </script>
</body>
</html>
