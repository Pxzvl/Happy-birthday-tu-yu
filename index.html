<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>17 Anos da Alinne 🍓</title>
    <style>
        :root {
            --vermelho: #ff3333;
            --azul: #003399;
        }
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
            background: linear-gradient(135deg, var(--azul), var(--vermelho));
        }

        /* Chuva de Morangos */
        .strawberry {
            position: absolute;
            font-size: 25px;
            pointer-events: none;
            z-index: 1;
            animation: fall linear infinite;
        }
        @keyframes fall {
            0% { transform: translateY(-10vh) rotate(0deg); }
            100% { transform: translateY(110vh) rotate(360deg); }
        }

        #main-container {
            position: relative;
            z-index: 10;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
            color: white;
        }

        .card {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(12px);
            padding: 30px;
            border-radius: 20px;
            width: 85%;
            max-width: 400px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.2);
        }

        .btn-option {
            background: white;
            color: var(--azul);
            border: none;
            padding: 12px;
            border-radius: 10px;
            font-size: 15px;
            margin: 8px 0;
            cursor: pointer;
            width: 100%;
            font-weight: bold;
            transition: 0.3s;
        }

        /* Raspadinha */
        #scratch-section { display: none; flex-direction: column; align-items: center; }
        #scratch-container {
            position: relative;
            width: 300px;
            height: 400px;
            margin-top: 20px;
            border: 5px solid white;
            border-radius: 15px;
            overflow: hidden;
        }
        canvas {
            position: absolute;
            top: 0; left: 0;
            z-index: 2;
            touch-action: none;
        }
        #video-content {
            width: 100%;
            height: 100%;
            background: black;
        }
        .hidden { display: none; }
    </style>
</head>
<body>

    <div id="main-container">
        <div id="quiz-section" class="card">
            <h2 id="question-text">Carregando...</h2>
            <div id="options-container"></div>
        </div>

        <div id="scratch-section">
            <h2 style="text-shadow: 2px 2px 4px rgba(0,0,0,0.5);">Raspe seu presente, Alinne! 🍓</h2>
            <div id="scratch-container">
                <div id="video-content">
                    <iframe width="100%" height="100%" src="https://www.youtube.com/embed/6JG20Tt2DAQ?autoplay=1&mute=1&controls=0&loop=1&playlist=6JG20Tt2DAQ" frameborder="0" allow="autoplay; encrypted-media" allowfullscreen></iframe>
                </div>
                <canvas id="scratch-canvas" width="300" height="400"></canvas>
            </div>
        </div>
    </div>

    <iframe id="audio-player" width="0" height="0" src="https://www.youtube.com/embed/Vmjav3dZcNQ?enablejsapi=1" frameborder="0"></iframe>

    <script>
        function createStrawberry() {
            const s = document.createElement('div');
            s.className = 'strawberry';
            s.innerHTML = '🍓';
            s.style.left = Math.random() * 100 + 'vw';
            s.style.animationDuration = (Math.random() * 3 + 2) + 's';
            document.body.appendChild(s);
            setTimeout(() => s.remove(), 5000);
        }
        setInterval(createStrawberry, 400);

        const quizData = [
            {
                q: "Como começamos a nos falar?",
                options: ["Na escola", "Eu esbarrei em você sem querer", "Pelo Instagram"],
                correct: 1
            },
            {
                q: "Qual melhor grupo de kpop que você já me apresentou?",
                options: ["Katseye", "Enhypen", "Twice", "New Jeans"],
                correct: 3
            },
            {
                q: "Qual dessas frases foi dita por você?",
                options: ["Tô undo", "A PRTEGA?", "Vdi tr ruder"],
                correct: 1
            }
        ];

        let currentQ = 0;
        function loadQuiz() {
            const data = quizData[currentQ];
            document.getElementById('question-text').innerText = data.q;
            const container = document.getElementById('options-container');
            container.innerHTML = "";
            data.options.forEach((opt, index) => {
                const btn = document.createElement('button');
                btn.className = 'btn-option';
                btn.innerText = opt;
                btn.onclick = () => {
                    if(index === data.correct) {
                        currentQ++;
                        if(currentQ < quizData.length) loadQuiz();
                        else initScratch();
                    } else { alert("🍓 Errou! Tenta de novo!"); }
                };
                container.appendChild(btn);
            });
        }
        loadQuiz();

        function initScratch() {
            document.getElementById('quiz-section').classList.add('hidden');
            document.getElementById('scratch-section').style.display = 'flex';
            
            // Iniciar música do BK
            const audio = document.getElementById('audio-player');
            audio.src += "&autoplay=1";

            const canvas = document.getElementById('scratch-canvas');
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#003399';
            ctx.fillRect(0, 0, 300, 400);
            ctx.fillStyle = 'white';
            ctx.font = 'bold 20px sans-serif';
            ctx.fillText('RASPE AQUI 🍓', 80, 200);

            let isDrawing = false;
            function scratch(e) {
                if(!isDrawing) return;
                const rect = canvas.getBoundingClientRect();
                const x = (e.clientX || e.touches[0].clientX) - rect.left;
                const y = (e.clientY || e.touches[0].clientY) - rect.top;
                ctx.globalCompositeOperation = 'destination-out';
                ctx.beginPath();
                ctx.arc(x, y, 40, 0, Math.PI * 2);
                ctx.fill();
            }
            canvas.addEventListener('mousedown', () => isDrawing = true);
            canvas.addEventListener('touchstart', () => isDrawing = true);
            window.addEventListener('mouseup', () => isDrawing = false);
            window.addEventListener('touchend', () => isDrawing = false);
            canvas.addEventListener('mousemove', scratch);
            canvas.addEventListener('touchmove', scratch);
        }
    </script>
</body>
  </html>
