<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>17 Anos da Alinne 🍓</title>
    <style>
        :root { --vermelho: #ff3333; --azul: #003399; }
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            font-family: 'Segoe UI', sans-serif; overflow: hidden;
            background: linear-gradient(135deg, var(--azul), var(--vermelho));
        }

        /* Morangos Voando */
        .strawberry {
            position: absolute; font-size: 25px; pointer-events: none;
            z-index: 100; animation: fall linear infinite;
        }
        @keyframes fall {
            0% { transform: translateY(-10vh) rotate(0deg); }
            100% { transform: translateY(110vh) rotate(360deg); }
        }

        /* Tela de Início (Arrastar) */
        #drag-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: black; z-index: 200; display: flex;
            flex-direction: column; justify-content: center; align-items: center;
            color: white; transition: transform 0.8s ease;
        }
        .arrow-up { font-size: 50px; animation: bounce 2s infinite; }
        @keyframes bounce { 0%, 20%, 50%, 80%, 100% {transform: translateY(0);} 40% {transform: translateY(-20px);} 60% {transform: translateY(-10px);} }

        /* Container de Conteúdo */
        #main-content {
            display: flex; flex-direction: column; justify-content: center;
            align-items: center; height: 100vh; text-align: center; color: white;
        }

        .card {
            background: rgba(255, 255, 255, 0.15); backdrop-filter: blur(12px);
            padding: 25px; border-radius: 20px; width: 85%; max-width: 350px;
            z-index: 10; border: 1px solid rgba(255,255,255,0.2);
        }

        .btn-option {
            background: white; color: var(--azul); border: none;
            padding: 12px; border-radius: 10px; font-size: 15px;
            margin: 8px 0; cursor: pointer; width: 100%; font-weight: bold;
        }

        /* Galeria de Fotos */
        .gallery {
            display: grid; grid-template-columns: repeat(2, 1fr);
            gap: 10px; margin-top: 20px; padding: 10px;
            max-height: 200px; overflow-y: auto;
        }
        .gallery img { width: 100%; border-radius: 10px; border: 2px solid white; }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="drag-screen">
        <h1 style="font-size: 3rem; letter-spacing: 5px;">ALINNE</h1>
        <div class="arrow-up">▲</div>
        <p>Arraste para cima</p>
    </div>

    <div id="main-content">
        <div id="quiz-section" class="card hidden">
            <h2 id="question-text">Pergunta 1</h2>
            <div id="options-container"></div>
        </div>

        <div id="surprise-section" class="hidden" style="z-index: 10;">
            <div id="scratch-container" style="position: relative; width: 300px; height: 400px; border: 4px solid white; border-radius: 15px; overflow: hidden;">
                <div id="final-content" style="width: 100%; height: 100%; background: #000;">
                    <iframe width="100%" height="50%" src="https://www.youtube.com/embed/6JG20Tt2DAQ?enablejsapi=1" frameborder="0"></iframe>
                    <div class="gallery">
                        <img src="LINK_DA_FOTO_1" alt="Foto 1">
                        <img src="LINK_DA_FOTO_2" alt="Foto 2">
                        <img src="LINK_DA_FOTO_3" alt="Foto 3">
                        <img src="LINK_DA_FOTO_4" alt="Foto 4">
                    </div>
                </div>
                <canvas id="scratch-canvas" width="300" height="400" style="position: absolute; top:0; left:0;"></canvas>
            </div>
        </div>
    </div>

    <iframe id="audio-player" width="0" height="0" src="https://www.youtube.com/embed/Vmjav3dZcNQ?enablejsapi=1" frameborder="0"></iframe>

    <script>
        // Morangos Voando (Desde o início)
        setInterval(() => {
            const s = document.createElement('div');
            s.className = 'strawberry';
            s.innerHTML = '🍓';
            s.style.left = Math.random() * 100 + 'vw';
            s.style.animationDuration = (Math.random() * 3 + 2) + 's';
            document.body.appendChild(s);
            setTimeout(() => s.remove(), 5000);
        }, 400);

        // Lógica de Arrastar (Mobile)
        let startY;
        const dragScreen = document.getElementById('drag-screen');
        
        dragScreen.addEventListener('touchstart', e => startY = e.touches[0].pageY);
        dragScreen.addEventListener('touchmove', e => {
            let moveY = e.touches[0].pageY;
            if (startY - moveY > 100) {
                dragScreen.style.transform = 'translateY(-100%)';
                document.getElementById('quiz-section').classList.remove('hidden');
            }
        });

        // Quiz
        const quizData = [
            {
                q: "Qual detalhe do nosso primeiro contato na escola foi inesquecível?",
                options: ["Eu te dei um oi", "Eu esbarrei em você sem querer", "A gente sentou junto"],
                correct: 1
            },
            {
                q: "Qual melhor grupo de kpop que você já me apresentou?",
                options: ["Katseye", "Enhypen", "Twice", "New Jeans"],
                correct: 3
            },
            {
                q: "Qual dessas frases foi dita por você?",
                options: ["Tô undo", "A PRTEGA?", "Vdi tr ruder"],
                correct: 1
            }
        ];

        let currentQ = 0;
        function loadQuiz() {
            const data = quizData[currentQ];
            document.getElementById('question-text').innerText = data.q;
            const container = document.getElementById('options-container');
            container.innerHTML = "";
            data.options.forEach((opt, index) => {
                const btn = document.createElement('button');
                btn.className = 'btn-option';
                btn.innerText = opt;
                btn.onclick = () => {
                    if(index === data.correct) {
                        currentQ++;
                        if(currentQ < quizData.length) loadQuiz();
                        else startSurprise();
                    } else { alert("🍓 Tenta de novo, Alinne!"); }
                };
                container.appendChild(btn);
            });
        }
        loadQuiz();

        function startSurprise() {
            document.getElementById('quiz-section').classList.add('hidden');
            document.getElementById('surprise-section').classList.remove('hidden');
            document.getElementById('audio-player').src += "&autoplay=1";
            
            const canvas = document.getElementById('scratch-canvas');
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#003399';
            ctx.fillRect(0,0,300,400);
            ctx.fillStyle = 'white';
            ctx.font = 'bold 20px sans-serif';
            ctx.fillText('RASPE AQUI 🍓', 80, 200);

            let isDrawing = false;
            function scratch(e) {
                if(!isDrawing) return;
                const rect = canvas.getBoundingClientRect();
                const x = (e.clientX || e.touches[0].clientX) - rect.left;
                const y = (e.clientY || e.touches[0].clientY) - rect.top;
                ctx.globalCompositeOperation = 'destination-out';
                ctx.beginPath(); ctx.arc(x, y, 40, 0, Math.PI * 2); ctx.fill();
            }
            canvas.addEventListener('touchstart', () => isDrawing = true);
            canvas.addEventListener('touchend', () => isDrawing = false);
            canvas.addEventListener('touchmove', scratch);
        }
    </script>
</body>
</html>
