<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>17 Anos da Alinne 🍓</title>
    <style>
        :root { --vermelho: #ff4d4d; --roxo: #9b59b6; --verde: #2ecc71; }
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            font-family: 'Segoe UI', sans-serif; overflow: hidden;
            background: #000;
        }

        /* Efeito Espaço Sideral */
        #star-container {
            position: fixed; width: 100%; height: 100%;
            background: radial-gradient(ellipse at bottom, #1B2735 0%, #090A0F 100%);
            z-index: 1;
        }
        .star {
            position: absolute; background: white; border-radius: 50%;
            opacity: 0.5; animation: twinkle var(--d) infinite;
        }
        @keyframes twinkle { 0%, 100% { opacity: 0.3; transform: scale(1); } 50% { opacity: 1; transform: scale(1.2); } }

        /* Elementos que Caem (Morangos, Emojis, Confetes) */
        .falling { position: absolute; pointer-events: none; z-index: 10; animation: fall linear infinite; }
        @keyframes fall {
            0% { transform: translateY(-10vh) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            100% { transform: translateY(110vh) rotate(360deg); opacity: 0.6; }
        }

        /* Nome Neon Vermelho */
        .neon-title {
            font-size: 4rem; color: #fff; text-align: center; font-weight: 900;
            text-transform: uppercase; letter-spacing: 5px; margin: 0;
            text-shadow: 0 0 10px var(--vermelho), 0 0 20px var(--vermelho), 0 0 40px var(--vermelho);
            animation: pulseNeon 2s infinite; z-index: 20; position: relative;
        }
        @keyframes pulseNeon {
            0%, 100% { text-shadow: 0 0 10px var(--vermelho), 0 0 20px var(--vermelho), 0 0 40px var(--vermelho); transform: scale(1); }
            50% { text-shadow: 0 0 20px var(--vermelho), 0 0 40px var(--vermelho), 0 0 80px var(--vermelho); transform: scale(1.05); }
        }

        /* Estilos Gerais das Telas */
        #drag-screen, #transition-screen, #kpop-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 200; display: flex; flex-direction: column;
            justify-content: center; align-items: center; color: white; text-align: center;
        }
        #drag-screen { transition: transform 1s cubic-bezier(0.4, 0, 0.2, 1); background: transparent; }
        
        /* Quiz e Polaroids */
        .card { background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(12px); padding: 30px; border-radius: 30px; width: 85%; max-width: 320px; z-index: 20; border: 1px solid rgba(255,255,255,0.2); }
        .btn-option { background: white; color: #333; border: none; padding: 15px; border-radius: 12px; font-size: 16px; margin: 10px 0; width: 100%; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-correct { background: var(--verde) !important; color: white !important; }
        .btn-wrong { background: var(--vermelho) !important; color: white !important; animation: shake 0.4s; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-10px); } 75% { transform: translateX(10px); } }

        .polaroid { position: absolute; width: 105px; background: white; padding: 8px 8px 22px 8px; box-shadow: 0 8px 20px rgba(0,0,0,0.8); z-index: 50; transform: rotate(var(--r)); transition: 0.3s; }
        .polaroid img { width: 100%; height: 95px; object-fit: cover; }
        .polaroid:active { transform: scale(1.4) rotate(0deg); z-index: 100; }

        #scratch-container { position: relative; width: 250px; height: 330px; border: 6px solid white; border-radius: 15px; overflow: hidden; }
        canvas { position: absolute; top:0; left:0; z-index: 10; touch-action: none; }
        .hidden { display: none !important; }
        .love-text { display: block; font-size: 1.8rem; font-weight: bold; color: #ff4d4d; margin-top: 20px; animation: heartBeat 1.5s infinite; }
        @keyframes heartBeat { 0%, 28%, 70% { transform: scale(1); } 14%, 42% { transform: scale(1.1); } }
    </style>
</head>
<body>

    <iframe id="main-audio" width="0" height="0" src="https://www.youtube.com/embed/V141wUSkTfk?enablejsapi=1" frameborder="0"></iframe>

    <div id="star-container"></div>

    <div id="drag-screen">
        <p style="letter-spacing: 3px; font-weight: 300; margin-bottom: 10px;">HOJE É O DIA DELA</p>
        <h1 class="neon-title">ALINNE</h1>
        <div style="font-size: 25px; margin: 20px;">🎂 🎁 ✨</div>
        <div style="font-size: 40px; animation: bounce 2s infinite; margin-top: 30px;">▲</div>
        <p style="font-size: 0.8rem; opacity: 0.8;">ARRASTE PARA CIMA</p>
    </div>

    <div id="transition-screen" class="hidden" style="background: black;">
        <h2 id="days-number" style="font-size: 4.5rem; color: #ff4d4d; margin: 0;">0</h2>
        <p style="font-size: 1.2rem;">dias de história...</p>
        <div id="phrases-box" class="hidden" style="padding: 25px;">
            <p style="font-size: 1.2rem; font-style: italic;">"Por cada risada e cada música nova... 🍓"</p>
            <p id="phrase-2" class="hidden" style="font-size: 1.3rem; font-weight: bold; color: #ff9999; margin-top: 15px;">Qualquer plano se torna perfeito se for com você.</p>
            <button id="btn-reveal" class="hidden btn-option" style="margin-top: 20px;">Abrir Presente ✨</button>
        </div>
    </div>

    <div id="main-content" style="display: flex; justify-content: center; align-items: center; height: 100vh;">
        <div id="quiz-section" class="card hidden">
            <h2 id="question-text"></h2>
            <div id="options-container"></div>
        </div>

        <div id="surprise-section" class="hidden" style="display: flex; flex-direction: column; align-items: center; z-index: 100;">
            <div style="position: relative;">
                <div class="polaroid" style="top: -50px; left: -40px; --r: -10deg;"><img src="https://cdn.discordapp.com/attachments/1453229527739142285/1474220443966771270/IMG_20241104_144249.jpg?ex=69990e47&is=6997bcc7&hm=a6c8dd7459fc6349d7dbbe4d41cfc99f09dd1f0a1c15a0c9a83a3e5b255992e9&"></div>
                <div class="polaroid" style="bottom: -30px; left: -45px; --r: 8deg;"><img src="https://cdn.discordapp.com/attachments/1453229527739142285/1474220122263781488/Screenshot_2025-02-18-19-47-26-021_com.instagram.android2.jpg?ex=69990dfa&is=6997bc7a&hm=e31edae5c434b9b4cef17a2459b1e616b96a7fc1589531cc570a74bf0cd5f869&"></div>
                <div class="polaroid" style="top: -40px; right: -40px; --r: 12deg;"><img src="https://cdn.discordapp.com/attachments/1453229527739142285/1474220053091319890/IMG_20250403_150058.jpg?ex=69990dea&is=6997bc6a&hm=c5d2c1116ee361772b565a07bb795da78124a31ef4e26451a5fe261628049086&"></div>
                <div class="polaroid" style="bottom: -40px; right: -45px; --r: -8deg;"><img src="https://cdn.discordapp.com/attachments/1453229527739142285/1474220052172771430/IMG-20260205-WA0037.jpg?ex=69990dea&is=6997bc6a&hm=ccb4d881b7a0d82044f1f4f1152df64f559582172e7f99d169eedcc764468d27&"></div>
                <div id="scratch-container">
                    <iframe id="vid1" width="100%" height="100%" src="https://www.youtube.com/embed/6JG20Tt2DAQ?enablejsapi=1&loop=1&playlist=6JG20Tt2DAQ" frameborder="0"></iframe>
                    <canvas id="scratch-canvas" width="250" height="330"></canvas>
                </div>
            </div>
            <button id="btn-extra" style="cursor: pointer;">Ainda não acabou... ✨</button>
        </div>
    </div>

    <div id="kpop-screen" class="hidden" style="background: black;">
        <div id="kpop-message"></div>
        <div id="kpop-vid-container" class="hidden" style="width: 85%; max-width: 400px; border: 2px solid white; border-radius: 15px; overflow: hidden; margin: 20px 0;">
            <iframe id="vid-enhypen" width="100%" height="220" src="" frameborder="0" allow="autoplay"></iframe>
        </div>
        <div id="final-bye" class="hidden"></div>
    </div>

    <script>
        // Criar Estrelas
        const starContainer = document.getElementById('star-container');
        for (let i = 0; i < 150; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            const size = Math.random() * 3 + 'px';
            star.style.width = size; star.style.height = size;
            star.style.left = Math.random() * 100 + 'vw';
            star.style.top = Math.random() * 100 + 'vh';
            star.style.setProperty('--d', (Math.random() * 3 + 2) + 's');
            starContainer.appendChild(star);
        }

        // Criar Morangos, Confetes e Emojis
        function createFalling() {
            const types = ['🍓', '🎉', '🎈', '✨', 'confetti'];
            const type = types[Math.floor(Math.random() * types.length)];
            const item = document.createElement('div');
            item.className = 'falling';
            
            if (type === 'confetti') {
                item.style.width = '8px'; item.style.height = '8px';
                item.style.background = ['#ff4d4d', '#ffd700', '#fff', '#9b59b6'][Math.floor(Math.random()*4)];
            } else {
                item.innerHTML = type; item.style.fontSize = (Math.random() * 20 + 20) + 'px';
            }
            
            item.style.left = Math.random() * 100 + 'vw';
            item.style.animationDuration = (Math.random() * 3 + 4) + 's';
            document.body.appendChild(item);
            setTimeout(() => item.remove(), 7000);
        }
        setInterval(createFalling, 300);

        // Lógica de Arrastar
        let startY;
        document.getElementById('drag-screen').addEventListener('touchstart', e => startY = e.touches[0].pageY);
        document.getElementById('drag-screen').addEventListener('touchmove', e => {
            if (startY - e.touches[0].pageY > 80) {
                document.getElementById('drag-screen').style.transform = 'translateY(-100%)';
                document.getElementById('quiz-section').classList.remove('hidden');
                document.getElementById('main-audio').src += "&autoplay=1";
            }
        });

        // Quiz
        const quizData = [
            { q: "Como começamos a nos falar?", options: ["Na escola", "Eu esbarrei em você sem querer", "Pelo Insta"], correct: 1 },
            { q: "Qual o melhor grupo de kpop que você me apresentou?", options: ["Katseye", "Enhypen", "Twice", "New Jeans"], correct: 3 },
            { q: "Qual dessas frases foi dita por você?", options: ["Tô undo", "A PRTEGA?", "Vdi tr ruder"], correct: 1 }
        ];

        let currentQ = 0;
        function loadQuiz() {
            const data = quizData[currentQ];
            document.getElementById('question-text').innerText = data.q;
            const container = document.getElementById('options-container'); container.innerHTML = "";
            data.options.forEach((opt, index) => {
                const btn = document.createElement('button'); btn.className = 'btn-option'; btn.innerText = opt;
                btn.onclick = () => {
                    if(index === data.correct) {
                        btn.classList.add('btn-correct');
                        setTimeout(() => { currentQ++; if(currentQ < quizData.length) loadQuiz(); else startTransition(); }, 800);
                    } else {
                        btn.classList.add('btn-wrong');
                        setTimeout(() => btn.classList.remove('btn-wrong'), 500);
                    }
                };
                container.appendChild(btn);
            });
        }
        loadQuiz();

        function startTransition() {
            document.getElementById('quiz-section').classList.add('hidden');
            document.getElementById('transition-screen').classList.remove('hidden');
            let count = 0; const timer = setInterval(() => {
                count += 5; if(count >= 1095) { count = 1095; clearInterval(timer); showPhrases(); }
                document.getElementById('days-number').innerText = count;
            }, 25);
        }

        function showPhrases() {
            setTimeout(() => { document.getElementById('phrases-box').classList.remove('hidden');
            setTimeout(() => { document.getElementById('phrase-2').classList.remove('hidden'); 
            setTimeout(() => { document.getElementById('btn-reveal').classList.remove('hidden'); }, 2000); }, 2000); }, 1000);
        }

        document.getElementById('btn-reveal').onclick = () => {
            document.getElementById('transition-screen').classList.add('hidden');
            document.getElementById('surprise-section').classList.remove('hidden');
            document.getElementById('vid1').src += "&autoplay=1&mute=1";
            initScratch();
        };

        function initScratch() {
            const canvas = document.getElementById('scratch-canvas'); const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#ff4d4d'; ctx.fillRect(0,0,250,330);
            ctx.fillStyle = 'white'; ctx.font = 'bold 18px sans-serif'; ctx.fillText('RASPE AQUI 🍓', 65, 165);
            let draw = false;
            const scratch = (e) => { if(!draw) return; const r = canvas.getBoundingClientRect(); const x = (e.clientX || e.touches[0].clientX)-r.left; const y = (e.clientY || e.touches[0].clientY)-r.top; ctx.globalCompositeOperation = 'destination-out'; ctx.beginPath(); ctx.arc(x,y,40,0,Math.PI*2); ctx.fill(); };
            canvas.addEventListener('touchstart', () => draw = true); canvas.addEventListener('touchend', () => draw = false); canvas.addEventListener('touchmove', scratch);
        }

        document.getElementById('btn-extra').onclick = () => {
            document.getElementById('main-audio').src = "about:blank";
            document.getElementById('surprise-section').classList.add('hidden');
            document.getElementById('kpop-screen').classList.remove('hidden');
            
            const text = "Eles também não te esqueceram... ❤️";
            const box = document.getElementById('kpop-message'); let i = 0;
            const type = setInterval(() => {
                box.innerHTML += text.charAt(i); i++;
                if (i >= text.length) {
                    clearInterval(type);
                    setTimeout(() => {
                        document.getElementById('kpop-vid-container').classList.remove('hidden');
                        document.getElementById('vid-enhypen').src = "https://www.youtube.com/embed/8KA5mbn513Y?autoplay=1";
                        setTimeout(() => {
                            const finalMsg = document.getElementById('final-bye');
                            finalMsg.innerHTML = "Olhar para trás e ver tudo o que construímos nesses 3 anos me faz perceber que as melhores coisas da vida acontecem quando a gente menos espera. O que começou com um esbarrão bobo na escola se tornou a minha parte favorita do dia.<br><br>Ver você chegar aos 17 anos é um privilégio, e eu espero que esse novo ciclo te traga tanta luz quanto você traz para os meus dias. Que a gente continue descobrindo músicas novas, rindo de coisas sem sentido e criando memórias que a gente ainda vai guardar com carinho por muito tempo.<br><br>Aproveita cada segundo, Alinne. Você merece o mundo, mas hoje, espero que esse pequeno pedaço de código tenha conseguido te fazer sorrir. <span class='love-text'>EU TE AMO! ❤️</span>";
                            finalMsg.classList.add('fade-in'); finalMsg.classList.remove('hidden');
                        }, 18000);
                    }, 1000);
                }
            }, 100);
        };
    </script>
</body>
</html>
