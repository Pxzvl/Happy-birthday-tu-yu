<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>17 Anos da Alinne 🍓</title>
    <style>
        :root { --vermelho: #ff3333; --azul: #003399; }
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            font-family: 'Segoe UI', sans-serif; overflow: hidden;
            background: linear-gradient(135deg, var(--azul), var(--vermelho));
        }

        /* Chuva de Morangos em toda a tela */
        .strawberry {
            position: absolute; font-size: 25px; pointer-events: none;
            z-index: 5; animation: fall linear infinite;
        }
        @keyframes fall {
            0% { transform: translateY(-10vh) translateX(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(110vh) translateX(20px) rotate(360deg); opacity: 0.5; }
        }

        /* Fotos Espalhadas ao Fundo */
        .bg-photo {
            position: absolute; width: 100px; height: 100px; 
            object-fit: cover; border-radius: 10px; border: 3px solid white;
            z-index: 2; opacity: 0.8; transform: rotate(var(--r));
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        /* Tela de Início */
        #drag-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 200; display: flex;
            flex-direction: column; justify-content: center; align-items: center;
            color: white; transition: transform 0.8s ease;
        }
        .decoration { font-size: 40px; margin: 10px; }
        .arrow-up { font-size: 50px; animation: bounce 2s infinite; margin-top: 20px; }
        @keyframes bounce { 0%, 20%, 50%, 80%, 100% {transform: translateY(0);} 40% {transform: translateY(-20px);} }

        #main-content {
            display: flex; flex-direction: column; justify-content: center;
            align-items: center; height: 100vh; text-align: center; color: white;
        }

        .card {
            background: rgba(255, 255, 255, 0.2); backdrop-filter: blur(15px);
            padding: 25px; border-radius: 20px; width: 85%; max-width: 350px;
            z-index: 10; border: 1px solid rgba(255,255,255,0.3);
        }

        .btn-option {
            background: white; color: var(--azul); border: none;
            padding: 12px; border-radius: 10px; font-size: 15px;
            margin: 8px 0; cursor: pointer; width: 100%; font-weight: bold;
        }

        /* Raspadinha - Só Vídeo */
        #surprise-section { z-index: 20; }
        #scratch-container {
            position: relative; width: 280px; height: 350px;
            border: 5px solid white; border-radius: 15px; overflow: hidden;
            background: black;
        }
        canvas { position: absolute; top:0; left:0; z-index: 2; touch-action: none; }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <img src="LINK_FOTO_1" class="bg-photo" style="top: 10%; left: 5%; --r: -15deg;">
    <img src="LINK_FOTO_2" class="bg-photo" style="top: 15%; right: 5%; --r: 10deg;">
    <img src="LINK_FOTO_3" class="bg-photo" style="bottom: 10%; left: 8%; --r: 20deg;">
    <img src="LINK_FOTO_4" class="bg-photo" style="bottom: 15%; right: 7%; --r: -10deg;">

    <div id="drag-screen">
        <div class="decoration">🎈 ✨ 🎂</div>
        <h1 style="font-size: 3.5rem; letter-spacing: 8px; margin: 0; color: #ff4d4d; text-shadow: 2px 2px white;">ALINNE</h1>
        <div class="decoration">🎉 🍓 🎁</div>
        <div class="arrow-up">▲</div>
        <p>Arraste para cima para começar</p>
    </div>

    <div id="main-content">
        <div id="quiz-section" class="card hidden">
            <h2 id="question-text">Pergunta 1</h2>
            <div id="options-container"></div>
        </div>

        <div id="surprise-section" class="hidden">
            <div id="scratch-container">
                <iframe id="video-player" width="100%" height="100%" src="https://www.youtube.com/embed/6JG20Tt2DAQ?enablejsapi=1" frameborder="0" allow="autoplay"></iframe>
                <canvas id="scratch-canvas" width="280" height="350"></canvas>
            </div>
            <p style="margin-top:15px; font-weight:bold;">RASPE PARA VER SEU VÍDEO! 🍓</p>
        </div>
    </div>

    <iframe id="audio-player" width="0" height="0" src="https://www.youtube.com/embed/Vmjav3dZcNQ?enablejsapi=1" frameborder="0"></iframe>

    <script>
        // Morangos por toda a tela
        function createStrawberry() {
            const s = document.createElement('div');
            s.className = 'strawberry';
            s.innerHTML = '🍓';
            s.style.left = Math.random() * 100 + 'vw';
            s.style.top = "-5vh";
            s.style.animationDuration = (Math.random() * 5 + 3) + 's';
            document.body.appendChild(s);
            setTimeout(() => s.remove(), 7000);
        }
        setInterval(createStrawberry, 300);

        // Arrastar para cima
        let startY;
        const dragScreen = document.getElementById('drag-screen');
        dragScreen.addEventListener('touchstart', e => startY = e.touches[0].pageY);
        dragScreen.addEventListener('touchmove', e => {
            if (startY - e.touches[0].pageY > 100) {
                dragScreen.style.transform = 'translateY(-100%)';
                document.getElementById('quiz-section').classList.remove('hidden');
            }
        });

        // Quiz (Mantido conforme as perguntas enviadas)
        const quizData = [
            {
                q: "Qual detalhe do nosso primeiro contato na escola foi inesquecível?",
                options: ["Eu te dei um oi", "Eu esbarrei em você sem querer", "A gente sentou junto"],
                correct: 1
            },
            {
                q: "Qual melhor grupo de kpop que você já me apresentou?",
                options: ["Katseye", "Enhypen", "Twice", "New Jeans"],
                correct: 3
            },
            {
                q: "Qual dessas frases foi dita por você?",
                options: ["Tô undo", "A PRTEGA?", "Vdi tr ruder"],
                correct: 1
            }
        ];

        let currentQ = 0;
        function loadQuiz() {
            const data = quizData[currentQ];
            document.getElementById('question-text').innerText = data.q;
            const container = document.getElementById('options-container');
            container.innerHTML = "";
            data.options.forEach((opt, index) => {
                const btn = document.createElement('button');
                btn.className = 'btn-option';
                btn.innerText = opt;
                btn.onclick = () => {
                    if(index === data.correct) {
                        currentQ++;
                        if(currentQ < quizData.length) loadQuiz();
                        else startSurprise();
                    } else { alert("🍓 Errou! Tenta de novo!"); }
                };
                container.appendChild(btn);
            });
        }
        loadQuiz();

        function startSurprise() {
            document.getElementById('quiz-section').classList.add('hidden');
            document.getElementById('surprise-section').classList.remove('hidden');
            document.getElementById('audio-player').src += "&autoplay=1";
            
            const canvas = document.getElementById('scratch-canvas');
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#ff3333'; // Camada vermelha para raspar
            ctx.fillRect(0,0,280,350);
            ctx.fillStyle = 'white';
            ctx.font = 'bold 18px sans-serif';
            ctx.fillText('RASPE O MORANGO 🍓', 50, 175);

            let isDrawing = false;
            function scratch(e) {
                if(!isDrawing) return;
                const rect = canvas.getBoundingClientRect();
                const x = (e.clientX || e.touches[0].clientX) - rect.left;
                const y = (e.clientY || e.touches[0].clientY) - rect.top;
                ctx.globalCompositeOperation = 'destination-out';
                ctx.beginPath(); ctx.arc(x, y, 35, 0, Math.PI * 2); ctx.fill();
            }
            canvas.addEventListener('touchstart', () => isDrawing = true);
            canvas.addEventListener('touchend', () => isDrawing = false);
            canvas.addEventListener('touchmove', scratch);
        }
    </script>
</body>
</html>
