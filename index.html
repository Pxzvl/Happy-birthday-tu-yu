<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>17 Anos da Alinne 🍓</title>
    <style>
        :root { --vermelho: #ff4d4d; --azul: #1a4d8c; }
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            font-family: 'Segoe UI', sans-serif; overflow: hidden;
            background: radial-gradient(circle, #2c3e50, #000);
        }

        /* Elementos Voadores */
        .strawberry { position: absolute; font-size: 45px; pointer-events: none; z-index: 5; animation: fall linear infinite; }
        .confetti { position: absolute; width: 8px; height: 8px; z-index: 5; animation: fall linear infinite; }
        @keyframes fall {
            0% { transform: translateY(-20vh) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            100% { transform: translateY(110vh) rotate(360deg); opacity: 0.6; }
        }

        /* Polaroids */
        .polaroid {
            position: absolute; width: 105px; background: white; padding: 8px 8px 22px 8px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.8); z-index: 50; transform: rotate(var(--r));
        }
        .polaroid img { width: 100%; height: 95px; object-fit: cover; }

        /* Telas */
        #drag-screen, #transition-screen, #kpop-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: black; z-index: 200; display: flex; flex-direction: column;
            justify-content: center; align-items: center; color: white; text-align: center;
        }
        #drag-screen { transition: transform 1s cubic-bezier(0.4, 0, 0.2, 1); }
        
        .card {
            background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(12px);
            padding: 30px; border-radius: 30px; width: 85%; max-width: 320px;
            z-index: 20; border: 1px solid rgba(255,255,255,0.2); color: white;
        }

        .btn-option {
            background: white; color: #333; border: none; padding: 15px;
            border-radius: 12px; font-size: 16px; margin: 10px 0; width: 100%; font-weight: bold;
        }

        #btn-extra {
            background: linear-gradient(45deg, #ff4d4d, #ff00ff);
            color: white; border: none; padding: 12px 25px; border-radius: 20px;
            margin-top: 25px; font-weight: bold; cursor: pointer;
            animation: pulse 2s infinite; z-index: 100;
        }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }

        #scratch-container { position: relative; width: 250px; height: 330px; border: 6px solid white; border-radius: 15px; overflow: hidden; background: #000; }
        canvas { position: absolute; top:0; left:0; z-index: 10; touch-action: none; }
        
        .hidden { display: none !important; }
        .fade-in { animation: fadeIn 2s forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        #kpop-message { font-size: 1.5rem; width: 80%; margin-bottom: 20vh; height: 1.6rem; }
    </style>
</head>
<body>

    <div id="drag-screen">
        <div style="font-size: 50px;">🎂 ✨ 🎈</div>
        <h1 style="font-size: 3.5rem; letter-spacing: 10px; color: #ff4d4d;">ALINNE</h1>
        <div style="font-size: 35px; margin: 15px;">🎁 🍓 🎉</div>
        <div style="font-size: 40px; animation: bounce 2s infinite;">▲</div>
        <p>ARRASTE PARA CIMA</p>
    </div>

    <div id="transition-screen" class="hidden">
        <div id="counter-box">
            <h2 id="days-number" style="font-size: 4.5rem; color: #ff4d4d; margin: 0;">0</h2>
            <p style="font-size: 1.2rem;">dias desde que esbarrei em você...</p>
        </div>
        <div id="phrases-box" class="hidden" style="padding: 25px;">
            <p class="fade-in" style="font-size: 1.3rem;">"Por cada risada e cada música nova... 🍓"</p>
            <p id="phrase-2" class="hidden fade-in" style="font-size: 1.4rem; font-weight: bold; color: #ff9999;">Qualquer plano se torna perfeito se for com você.</p>
            <button id="btn-reveal" class="hidden btn-option" style="margin-top: 20px;">Ver meu presente ✨</button>
        </div>
    </div>

    <div id="main-content" style="display: flex; justify-content: center; align-items: center; height: 100vh;">
        <div id="quiz-section" class="card hidden">
            <h2 id="question-text"></h2>
            <div id="options-container"></div>
        </div>

        <div id="surprise-section" class="hidden" style="display: flex; flex-direction: column; align-items: center;">
            <div style="position: relative; margin-bottom: 20px;">
                <div class="polaroid" style="top: -50px; left: -50px; --r: -12deg;"><img src="https://cdn.discordapp.com/attachments/1453229527739142285/1474220443966771270/IMG_20241104_144249.jpg?ex=69990e47&is=6997bcc7&hm=a6c8dd7459fc6349d7dbbe4d41cfc99f09dd1f0a1c15a0c9a83a3e5b255992e9&"></div>
                <div class="polaroid" style="bottom: -30px; left: -55px; --r: 8deg;"><img src="https://cdn.discordapp.com/attachments/1453229527739142285/1474220122263781488/Screenshot_2025-02-18-19-47-26-021_com.instagram.android2.jpg?ex=69990dfa&is=6997bc7a&hm=e31edae5c434b9b4cef17a2459b1e616b96a7fc1589531cc570a74bf0cd5f869&"></div>
                <div class="polaroid" style="top: -40px; right: -50px; --r: 15deg;"><img src="https://cdn.discordapp.com/attachments/1453229527739142285/1474220053091319890/IMG_20250403_150058.jpg?ex=69990dea&is=6997bc6a&hm=c5d2c1116ee361772b565a07bb795da78124a31ef4e26451a5fe261628049086&"></div>
                <div class="polaroid" style="bottom: -40px; right: -55px; --r: -10deg;"><img src="https://cdn.discordapp.com/attachments/1453229527739142285/1474220052172771430/IMG-20260205-WA0037.jpg?ex=69990dea&is=6997bc6a&hm=ccb4d881b7a0d82044f1f4f1152df64f559582172e7f99d169eedcc764468d27&"></div>
                <div id="scratch-container">
                    <iframe id="vid1" width="100%" height="100%" src="https://www.youtube.com/embed/6JG20Tt2DAQ?enablejsapi=1&loop=1&playlist=6JG20Tt2DAQ" frameborder="0"></iframe>
                    <canvas id="scratch-canvas" width="250" height="330"></canvas>
                </div>
            </div>
            <button id="btn-extra">Ainda não acabou... ✨</button>
        </div>
    </div>

    <div id="kpop-screen" class="hidden">
        <div id="kpop-message"></div>
        <div id="kpop-vid-container" class="hidden" style="width: 90%; max-width: 500px; border: 3px solid #ff4d4d; border-radius: 10px; overflow: hidden;">
            <iframe id="vid-enhypen" width="100%" height="315" src="" frameborder="0" allow="autoplay"></iframe>
        </div>
    </div>

    <iframe id="audio-player" width="0" height="0" src="https://www.youtube.com/embed/Vmjav3dZcNQ?enablejsapi=1" frameborder="0"></iframe>

    <script>
        // Morangos e Confetes em todo lugar
        function createItem(type) {
            const item = document.createElement('div');
            if(type === '🍓') { item.className = 'strawberry'; item.innerHTML = '🍓'; item.style.animationDuration = '8s'; }
            else { item.className = 'confetti'; const colors=['#ff4d4d','#fff','#ffd700','#ff00ff']; item.style.background=colors[Math.floor(Math.random()*4)]; item.style.animationDuration='4s'; }
            item.style.left = Math.random() * 95 + 'vw'; item.style.top = "-15vh";
            document.body.appendChild(item); setTimeout(() => item.remove(), 10000);
        }
        setInterval(() => createItem('🍓'), 1000);
        setInterval(() => createItem('confetti'), 300);

        // Arrastar
        let startY;
        document.getElementById('drag-screen').addEventListener('touchstart', e => startY = e.touches[0].pageY);
        document.getElementById('drag-screen').addEventListener('touchmove', e => {
            if (startY - e.touches[0].pageY > 80) {
                document.getElementById('drag-screen').style.transform = 'translateY(-100%)';
                document.getElementById('quiz-section').classList.remove('hidden');
            }
        });

        const quizData = [
            { q: "Como começamos a nos falar?", options: ["Na escola", "Eu esbarrei em você sem querer", "Pelo Insta"], correct: 1 },
            { q: "Qual o melhor grupo de kpop que você me apresentou?", options: ["Katseye", "Enhypen", "Twice", "New Jeans"], correct: 3 },
            { q: "Qual dessas frases foi dita por você?", options: ["Tô undo", "A PRTEGA?", "Vdi tr ruder"], correct: 1 }
        ];

        let currentQ = 0;
        function loadQuiz() {
            const data = quizData[currentQ];
            document.getElementById('question-text').innerText = data.q;
            const container = document.getElementById('options-container'); container.innerHTML = "";
            data.options.forEach((opt, index) => {
                const btn = document.createElement('button'); btn.className = 'btn-option'; btn.innerText = opt;
                btn.onclick = () => { if(index === data.correct) { currentQ++; if(currentQ < quizData.length) loadQuiz(); else startTransition(); } else alert("🍓 Errou!"); };
                container.appendChild(btn);
            });
        }
        loadQuiz();

        function startTransition() {
            document.getElementById('quiz-section').classList.add('hidden');
            document.getElementById('transition-screen').classList.remove('hidden');
            let count = 0; const target = 1095;
            const timer = setInterval(() => {
                count += 7; if(count >= target) { count = target; clearInterval(timer); showPhrases(); }
                document.getElementById('days-number').innerText = count;
            }, 30);
        }

        function showPhrases() {
            setTimeout(() => { document.getElementById('phrases-box').classList.remove('hidden');
            setTimeout(() => { document.getElementById('phrase-2').classList.remove('hidden'); 
            setTimeout(() => { document.getElementById('btn-reveal').classList.remove('hidden'); }, 2000); }, 2000); }, 1000);
        }

        document.getElementById('btn-reveal').onclick = () => {
            document.getElementById('transition-screen').classList.add('hidden');
            document.getElementById('surprise-section').classList.remove('hidden');
            document.getElementById('vid1').src += "&autoplay=1&mute=1";
            document.getElementById('audio-player').src += "&autoplay=1";
            initScratch();
        };

        function initScratch() {
            const canvas = document.getElementById('scratch-canvas');
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#ff4d4d'; ctx.fillRect(0,0,250,330);
            ctx.fillStyle = 'white'; ctx.font = 'bold 18px sans-serif'; ctx.fillText('RASPE AQUI 🍓', 65, 165);
            let draw = false;
            const scratch = (e) => { if(!draw) return; const r = canvas.getBoundingClientRect(); const x = (e.clientX || e.touches[0].clientX)-r.left; const y = (e.clientY || e.touches[0].clientY)-r.top; ctx.globalCompositeOperation = 'destination-out'; ctx.beginPath(); ctx.arc(x,y,40,0,Math.PI*2); ctx.fill(); };
            canvas.addEventListener('touchstart', () => draw = true); canvas.addEventListener('touchend', () => draw = false); canvas.addEventListener('touchmove', scratch);
        }

        // --- FINAL DO ENHYPEN ---
        document.getElementById('btn-extra').onclick = () => {
            document.getElementById('surprise-section').classList.add('hidden');
            document.getElementById('kpop-screen').classList.remove('hidden');
            document.getElementById('audio-player').src = "about:blank"; // Para o áudio anterior
            
            const text = "Eles também não te esqueceram... ❤️";
            const box = document.getElementById('kpop-message');
            let i = 0;
            const type = setInterval(() => {
                box.innerHTML += text.charAt(i); i++;
                if (i >= text.length) {
                    clearInterval(type);
                    setTimeout(() => {
                        document.getElementById('kpop-vid-container').classList.remove('hidden');
                        document.getElementById('vid-enhypen').src = "https://www.youtube.com/embed/8KA5mbn513Y?autoplay=1";
                    }, 1000);
                }
            }, 100);
        };
    </script>
</body>
</html>
