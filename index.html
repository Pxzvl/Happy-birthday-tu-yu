<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>17 Anos da Alinne 🍓</title>
    <style>
        :root { --vermelho: #ff3333; --azul: #003399; }
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            font-family: 'Segoe UI', sans-serif; overflow: hidden;
            background: linear-gradient(135deg, var(--azul), var(--vermelho));
        }

        /* Morangos Maiores e Lentos por toda a tela */
        .strawberry {
            position: absolute; font-size: 45px; pointer-events: none;
            z-index: 5; animation: fall linear infinite;
        }
        @keyframes fall {
            0% { transform: translateY(-15vh) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            100% { transform: translateY(110vh) rotate(360deg); opacity: 0.8; }
        }

        /* Estilo Polaroid */
        .polaroid {
            position: absolute; width: 110px; background: white;
            padding: 8px 8px 25px 8px; box-shadow: 0 8px 15px rgba(0,0,0,0.4);
            border-radius: 2px; z-index: 2; transform: rotate(var(--r));
        }
        .polaroid img { width: 100%; height: 110px; object-fit: cover; }

        /* Tela de Início Enfeitada */
        #drag-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); z-index: 200; display: flex;
            flex-direction: column; justify-content: center; align-items: center;
            color: white; transition: transform 0.8s ease;
        }
        .bday-decor { font-size: 50px; margin: 15px; filter: drop-shadow(0 0 10px gold); }
        .arrow-up { font-size: 40px; animation: bounce 2s infinite; margin-top: 30px; }
        @keyframes bounce { 0%, 20%, 50%, 80%, 100% {transform: translateY(0);} 40% {transform: translateY(-15px);} }

        /* Containers */
        #main-content {
            display: flex; flex-direction: column; justify-content: center;
            align-items: center; height: 100vh; text-align: center; color: white;
        }
        .card {
            background: rgba(255, 255, 255, 0.2); backdrop-filter: blur(15px);
            padding: 25px; border-radius: 20px; width: 85%; max-width: 350px;
            z-index: 10; border: 2px solid rgba(255,255,255,0.4);
        }
        .btn-option {
            background: white; color: var(--azul); border: none;
            padding: 14px; border-radius: 12px; font-size: 16px;
            margin: 10px 0; cursor: pointer; width: 100%; font-weight: bold;
        }

        /* Raspadinha Centralizada */
        #surprise-section { z-index: 20; position: relative; }
        #scratch-container {
            position: relative; width: 260px; height: 380px;
            border: 6px solid white; border-radius: 15px; overflow: hidden; background: black;
        }
        canvas { position: absolute; top:0; left:0; z-index: 2; touch-action: none; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="drag-screen">
        <div class="bday-decor">🎂 ✨ 🎈</div>
        <h1 style="font-size: 3.8rem; letter-spacing: 10px; margin: 0; color: #ff3333; text-shadow: 3px 3px 0px white;">ALINNE</h1>
        <div class="bday-decor">🎁 🍓 🎉</div>
        <div class="arrow-up">▲</div>
        <p style="font-weight: bold; letter-spacing: 2px;">ARRASTE PARA CIMA</p>
    </div>

    <div id="main-content">
        <div id="quiz-section" class="card hidden">
            <h2 id="question-text"></h2>
            <div id="options-container"></div>
        </div>

        <div id="surprise-section" class="hidden">
            <div class="polaroid" style="top: -60px; left: -100px; --r: -15deg;"><img src="LINK_FOTO_1"></div>
            <div class="polaroid" style="top: 150px; left: -110px; --r: 10deg;"><img src="LINK_FOTO_2"></div>
            <div class="polaroid" style="top: -50px; right: -100px; --r: 15deg;"><img src="LINK_FOTO_3"></div>
            <div class="polaroid" style="top: 160px; right: -110px; --r: -12deg;"><img src="LINK_FOTO_4"></div>

            <div id="scratch-container">
                <iframe width="100%" height="100%" src="https://www.youtube.com/embed/6JG20Tt2DAQ?enablejsapi=1&autoplay=1&mute=1" frameborder="0"></iframe>
                <canvas id="scratch-canvas" width="260" height="380"></canvas>
            </div>
            <p style="margin-top:20px; font-weight:bold; font-size: 1.2rem;">RASPE O VÍDEO! 🍓</p>
        </div>
    </div>

    <iframe id="audio-player" width="0" height="0" src="https://www.youtube.com/embed/Vmjav3dZcNQ?enablejsapi=1" frameborder="0"></iframe>

    <script>
        // Morangos Espalhados e Maiores
        function createStrawberry() {
            const s = document.createElement('div');
            s.className = 'strawberry';
            s.innerHTML = '🍓';
            s.style.left = Math.random() * 90 + 'vw';
            s.style.top = "-10vh";
            // Velocidade mais lenta (6 a 10 segundos)
            s.style.animationDuration = (Math.random() * 4 + 6) + 's';
            document.body.appendChild(s);
            setTimeout(() => s.remove(), 10000);
        }
        setInterval(createStrawberry, 600); // Intervalo maior para não encher demais

        // Lógica de Arrastar
        let startY;
        const dragScreen = document.getElementById('drag-screen');
        dragScreen.addEventListener('touchstart', e => startY = e.touches[0].pageY);
        dragScreen.addEventListener('touchmove', e => {
            if (startY - e.touches[0].pageY > 100) {
                dragScreen.style.transform = 'translateY(-100%)';
                setTimeout(() => {
                    dragScreen.classList.add('hidden');
                    document.getElementById('quiz-section').classList.remove('hidden');
                }, 800);
            }
        });

        // Quiz
        const quizData = [
            { q: "Como começamos a nos falar?", options: ["Na escola", "Eu esbarrei em você sem querer", "Pelo Insta"], correct: 1 },
            { q: "Qual melhor grupo de kpop que você me apresentou?", options: ["Katseye", "Enhypen", "Twice", "New Jeans"], correct: 3 },
            { q: "Qual dessas frases foi dita por você?", options: ["Tô undo", "A PRTEGA?", "Vdi tr ruder"], correct: 1 }
        ];

        let currentQ = 0;
        function loadQuiz() {
            const data = quizData[currentQ];
            document.getElementById('question-text').innerText = data.q;
            const container = document.getElementById('options-container');
            container.innerHTML = "";
            data.options.forEach((opt, index) => {
                const btn = document.createElement('button');
                btn.className = 'btn-option';
                btn.innerText = opt;
                btn.onclick = () => {
                    if(index === data.correct) {
                        currentQ++;
                        if(currentQ < quizData.length) loadQuiz();
                        else showSurprise();
                    } else { alert("🍓 Errou! Tenta de novo!"); }
                };
                container.appendChild(btn);
            });
        }
        loadQuiz();

        function showSurprise() {
            document.getElementById('quiz-section').classList.add('hidden');
            document.getElementById('surprise-section').classList.remove('hidden');
            document.getElementById('audio-player').src += "&autoplay=1";
            
            const canvas = document.getElementById('scratch-canvas');
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#ff3333';
            ctx.fillRect(0,0,260,380);
            ctx.fillStyle = 'white';
            ctx.font = 'bold 20px sans-serif';
            ctx.fillText('RASPE AQUI 🍓', 60, 190);

            let isDrawing = false;
            function scratch(e) {
                if(!isDrawing) return;
                const rect = canvas.getBoundingClientRect();
                const x = (e.clientX || e.touches[0].clientX) - rect.left;
                const y = (e.clientY || e.touches[0].clientY) - rect.top;
                ctx.globalCompositeOperation = 'destination-out';
                ctx.beginPath(); ctx.arc(x, y, 45, 0, Math.PI * 2); ctx.fill();
            }
            canvas.addEventListener('touchstart', () => isDrawing = true);
            canvas.addEventListener('touchend', () => isDrawing = false);
            canvas.addEventListener('touchmove', scratch);
        }
    </script>
</body>
</html>
